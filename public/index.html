<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfairy AI 🎀 Pink Paradise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Definisi variabel warna pink agar konsisten */
        :root {
            --hot-pink: #ff1493;
            --deep-pink: #ff69b4;
            --soft-pink: #ffc0cb;
            --white-pink: #fff5f7;
            --princess-pink: #ffe0e9;
        }

        body { 
            background-color: var(--white-pink);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; /* Mencegah scrollbar utama berlebihan */
            height: 100vh;
        }

        /* Font khusus untuk judul agar terlihat lucu */
        .font-lucu { font-family: 'Bubblegum Sans', cursive; }

        /* Gaya Latar Belakang Gradasi Pink Berjalan */
        .bg-animated {
            background: linear-gradient(-45deg, #ffc0cb, #ffb6c1, #ffe0e9, #fff0f5);
            background-size: 400% 400%;
            animation: gradient-anim 15s ease infinite;
        }
        @keyframes gradient-anim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ANIMASI EMOJI MELAYANG & BERPUTAR (Latar Belakang) */
        @keyframes floatRotate {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; }
            50% { transform: translateY(-30px) rotate(180deg) scale(1.1); opacity: 0.4; }
            100% { transform: translateY(0) rotate(360deg) scale(1); opacity: 0.7; }
        }
        .emoji-float {
            position: absolute;
            font-size: 3rem; /* Ukuran emoji latar belakang */
            animation: floatRotate 8s linear infinite;
            z-index: -1; /* Di belakang konten utama */
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.3));
        }

        /* Gaya Panel Kaca Pink Transparan */
        .glass-pink {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 4px solid var(--soft-pink);
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
        }

        /* Gaya Bubble Chat */
        .bubble-me { border-radius: 25px 25px 0 25px; background-color: var(--hot-pink); color: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .bubble-ai { border-radius: 25px 25px 25px 0; background-color: white; border: 2px solid var(--soft-pink); color: #ff0080; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }

        /* Animasi Tombol Bergetar Lucu */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        .btn-wiggle:hover:not(:disabled) { animation: wiggle 0.3s infinite; }

        /* Custom Scrollbar Pink Cantik */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--deep-pink); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--hot-pink); }
    </style>
</head>
<body class="bg-animated relative">

    <div class="emoji-float" style="top: 10%; left: 5%;">🌸</div>
    <div class="emoji-float" style="top: 5%; right: 10%; animation-delay: 1s;">✨</div>
    <div class="emoji-float" style="bottom: 15%; left: 10%; animation-delay: 2s;">🎀</div>
    <div class="emoji-float" style="bottom: 8%; right: 5%; animation-delay: 3s;">🧸</div>
    <div class="emoji-float" style="top: 50%; left: 2%; animation-delay: 1.5s;">🦄</div>
    <div class="emoji-float" style="top: 40%; right: 1%; animation-delay: 2.5s;">🍭</div>

    <div class="flex flex-col md:flex-row h-screen p-3 md:p-6 gap-4 relative z-10 overflow-hidden">
        
        <aside class="w-full md:w-1/4 glass-pink p-5 flex flex-col shadow-lg h-[180px] md:h-full overflow-hidden border-2 border-pink-200">
            <h2 class="text-2xl font-lucu text-[#ff1493] mb-3 flex items-center gap-2 justify-center md:justify-start tracking-tight">
                <i class="fas fa-heart text-pink-400"></i> Memori Cantik
            </h2>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-2.5 pr-1 text-sm font-medium text-pink-500 italic">
                Ayo buat obrolan manis... 🧸
            </div>
            <button onclick="clearHistory()" class="mt-3 text-[11px] font-black text-pink-300 hover:text-pink-600 uppercase tracking-widest transition-all">
                Hapus Semua Jejak ✨
            </button>
        </aside>

        <main class="w-full md:w-3/4 glass-pink flex flex-col overflow-hidden border-4 border-white shadow-xl">
            
            <header class="p-4 md:p-5 text-center border-b-2 border-pink-100 bg-white/30">
                <h1 class="text-3xl md:text-5xl font-lucu text-[#ff1493] tracking-wider drop-shadow-[0_2px_2px_rgba(255,105,180,0.3)]">
                    Anfairy AI 🎀
                </h1>
                <p class="text-[10px] md:text-xs text-pink-400 font-bold uppercase tracking-[0.3em] mt-1">Smart & Aesthetic Assistant</p>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-7 bg-white/50">
                <div class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-80 fade-in">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzhidG9udW52bjh2YnB6M3J4NTR4NTR4NTR4NTR4NTR4NTR4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif" width="120" alt="cute anime sparkle">
                    <p class="font-bold text-xl md:text-2xl text-pink-500 tracking-tight">Halo Tuan Putri! ✨</p>
                    <p class="text-pink-400 italic text-sm">Mau tanya apa hari ini? Aku siap membantu dengan gaya!</p>
                </div>
            </div>

            <section class="p-4 md:p-8 bg-white/60 border-t-2 border-pink-100">
                <div class="max-w-4xl mx-auto space-y-4">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="relative">
                            <i class="fas fa-star absolute left-3 top-3.5 text-pink-300 text-xs"></i>
                            <select id="persona" class="w-full pl-8 p-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 outline-none text-sm font-bold text-pink-600 glass-pink/50 cursor-pointer">
                                <option value="Mode Bestie">🌸 Mode Bestie (Friendly)</option>
                                <option value="Mode Dosen Galak">👩‍🏫 Mode Ibu Dosen (Strict)</option>
                                <option value="Pakar IT">💻 Master IT (Cool)</option>
                            </select>
                        </div>
                        <input type="file" id="fileInput" class="w-full text-xs text-pink-400 file:bg-pink-100 file:text-pink-700 file:border-0 file:rounded-full file:px-4 file:py-2.5 file:font-bold hover:file:bg-pink-200 cursor-pointer shadow-inner">
                    </div>

                    <div class="relative flex items-center">
                        <textarea id="pesan" rows="2" placeholder="Tulis pesan manismu di sini... 🍭✨" 
                            class="w-full p-5 pr-36 md:pr-40 rounded-[30px] border-4 border-white focus:border-pink-200 outline-none shadow-inner text-pink-700 font-medium placeholder-pink-300 text-sm md:text-base"></textarea>
                        
                        <button onclick="kirim()" id="btnKirim" 
                            class="absolute right-2 top-2 bottom-2 px-7 md:px-10 bg-[#ff1493] text-white font-black rounded-[25px] shadow-lg transition-all text-sm md:text-base btn-wiggle disabled:opacity-60 disabled:cursor-not-allowed">
                            KIRIM <i class="fas fa-magic ml-1"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Mengambil histori chat dari LocalStorage browser, atau array kosong jika tidak ada
        let chatHistory = JSON.parse(localStorage.getItem("anfairy_history")) || [];

        // Menampilkan histori chat pada bilah sisi saat halaman dimuat
        function updateHistoryUI() {
            const list = document.getElementById("historyList");
            if (chatHistory.length === 0) {
                list.innerHTML = "Belum ada chat lucu... 🧸";
                return;
            }
            // Membuat elemen HTML untuk setiap item histori
            list.innerHTML = chatHistory.map((h, i) => `
                <div class="flex justify-between items-center p-2.5 bg-white/40 rounded-xl border border-pink-100 group transition-all hover:bg-pink-50 cursor-pointer fade-in">
                    <span class="truncate font-medium">🎀 ${h.text}</span>
                    <button onclick="deleteChat(${i})" class="hidden group-hover:block text-pink-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            `).join("");
        }

        // Fungsi utama untuk mengirim pesan
        async function kirim() {
            const msgInput = document.getElementById("pesan");
            const btn = document.getElementById("btnKirim");
            const chatBox = document.getElementById("chatBox");
            const fileInput = document.getElementById("fileInput");

            // Validasi: Jangan kirim jika input kosong
            if (!msgInput.value.trim() && !fileInput.files[0]) return;

            // Efek Loading: Menonaktifkan tombol
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i>";

            // Simpan ke Histori Lokal (mengambil 30 karakter pertama)
            if(msgInput.value.trim()) {
                const shortText = msgInput.value.substring(0, 30) + (msgInput.value.length > 30 ? "..." : "");
                chatHistory.unshift({ text: shortText, date: new Date().toLocaleString() });
                // Batasi histori hanya 8 item terakhir agar rapi
                localStorage.setItem("anfairy_history", JSON.stringify(chatHistory.slice(0, 8)));
                updateHistoryUI();
            }

            // Persiapan data form untuk dikirim ke backend
            const formData = new FormData();
            formData.append("pesan", msgInput.value);
            formData.append("persona", document.getElementById("persona").value);
            if(fileInput.files[0]) formData.append("file", fileInput.files[0]);

            // Menambahkan Bubble Chat Pengguna (Pink Tua) ke UI
            chatBox.innerHTML += `
                <div class='flex justify-end fade-in'>
                    <div class='bubble-me p-4.5 shadow-lg text-sm font-medium'>${msgInput.value}</div>
                </div>`;
            // Reset input setelah dikirim
            msgInput.value = "";
            fileInput.value = ""; // Reset input file juga
            chatBox.scrollTop = chatBox.scrollHeight; // Scroll otomatis ke bawah

            try {
                // Mengirim permintaan ke backend
                const res = await fetch("/tanya", { method: "POST", body: formData });
                const data = await res.json();
                
                // Menambahkan Bubble Chat AI (Putih Glass) ke UI
                const id = "m" + Date.now(); // ID unik untuk setiap pesan AI
                chatBox.innerHTML += `
                    <div class='flex justify-start items-start gap-2 fade-in'>
                        <div class='bubble-ai p-5 shadow-sm text-sm text-pink-800 font-medium relative group'>
                            <b class='text-pink-600 font-extrabold'>✨ ${document.getElementById("persona").value}:</b><br>
                            <span id="${id}">${data.jawaban}</span>
                            
                            <div class="mt-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-all duration-300">
                                <button onclick="salin('${id}')" class="text-[10px] font-bold text-pink-500 bg-pink-50 px-3 py-1.5 rounded-full border border-pink-100 hover:bg-pink-100 transition-colors">
                                    <i class="fas fa-copy mr-1"></i> SALIN
                                </button>
                                <button onclick="simpan('${id}')" class="text-[10px] font-bold text-pink-500 bg-pink-50 px-3 py-1.5 rounded-full border border-pink-100 hover:bg-pink-100 transition-colors">
                                    <i class="fas fa-download mr-1"></i> SIMPAN .TXT
                                </button>
                            </div>
                        </div>
                    </div>`;
            } catch (err) {
                // Menampilkan pesan kesalahan jika terjadi masalah koneksi
                chatBox.innerHTML += "<p class='text-center text-red-400 font-bold text-xs italic fade-in'>Aduh AI-nya lelah! Tolong cek koneksi ya Princess... 🥀</p>";
            } finally {
                // Mengembalikan tombol kirim ke keadaan semula
                btn.disabled = false;
                btn.innerHTML = "KIRIM <i class='fas fa-magic ml-1'></i>";
                // Scroll otomatis ke jawaban terbaru
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Fungsi Fitur: Salin Teks Jawaban AI
        function salin(id) {
            const teks = document.getElementById(id).innerText;
            navigator.clipboard.writeText(teks).then(() => {
                alert("Berhasil disalin ke clipboard, Tuan Putri! ✨💖");
            });
        }

        // Fungsi Fitur: Unduh Jawaban AI sebagai file .txt
        function simpan(id) {
            const teks = document.getElementById(id).innerText;
            const blob = new Blob([teks], {type:"text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Jawaban-AnfairyAI.txt";
            a.click();
        }

        // Fungsi Fitur: Hapus satu item histori tunggal
        function deleteChat(i) {
            chatHistory.splice(i, 1);
            localStorage.setItem("anfairy_history", JSON.stringify(chatHistory));
            updateHistoryUI();
        }

        // Fungsi Fitur: Hapus SEMUA histori chat
        function clearHistory() {
            if(confirm("Hapus semua memori indah kita? 🥺🥺")) {
                chatHistory = [];
                localStorage.removeItem("anfairy_history");
                updateHistoryUI();
            }
        }

        // Inisialisasi tampilan histori saat halaman pertama kali dimuat
        updateHistoryUI();
    </script>
</body>
</html>
