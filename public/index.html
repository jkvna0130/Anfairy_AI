<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfairy AI 🎀✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #fff0f3; 
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }
        .pink-gradient { background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); }
        .glass { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px); 
            border: 2px solid rgba(255, 192, 203, 0.5); 
        }
        
        /* Animasi Emoji Gerak (Floating) */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            animation: float 4s ease-in-out infinite;
            z-index: -1;
            opacity: 0.5;
        }

        /* Animasi Kelap-kelip */
        @keyframes sparkle {
            0%, 100% { opacity: 1; scale: 1; }
            50% { opacity: 0.5; scale: 1.2; }
        }
        .sparkle-icon { animation: sparkle 2s infinite; }

        /* Bubble Chat Style */
        .bubble-user { border-radius: 25px 25px 0 25px; background: #ff85a2; }
        .bubble-ai { border-radius: 25px 25px 25px 0; background: white; border: 2px solid #ffccd5; }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="floating-emoji" style="top: 10%; left: 5%;">🌸</div>
    <div class="floating-emoji" style="top: 20%; right: 10%; animation-delay: 1s;">✨</div>
    <div class="floating-emoji" style="bottom: 15%; left: 8%; animation-delay: 2s;">🎀</div>
    <div class="floating-emoji" style="bottom: 10%; right: 5%; animation-delay: 0.5s;">🦄</div>
    <div class="floating-emoji" style="top: 50%; left: 2%; animation-delay: 1.5s;">🍭</div>

    <div class="flex flex-col md:flex-row h-screen p-3 md:p-6 gap-4 relative z-10">
        
        <aside class="w-full md:w-1/4 glass rounded-[40px] p-6 flex flex-col shadow-2xl h-[200px] md:h-full border-pink-200">
            <h2 class="text-2xl font-bold text-pink-500 mb-4 flex items-center gap-2">
                <i class="fas fa-heart sparkle-icon"></i> History 🦢
            </h2>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-3 pr-2 text-sm font-medium text-pink-400">
                Belum ada chat lucu... 🧸
            </div>
            <button onclick="clearHistory()" class="mt-4 text-xs font-bold text-pink-300 hover:text-pink-600 uppercase tracking-widest">
                — Delete Memory 🫧 —
            </button>
        </aside>

        <main class="w-full md:w-3/4 glass rounded-[40px] shadow-2xl flex flex-col overflow-hidden border-4 border-white">
            
            <header class="p-5 text-center bg-white/30 border-b border-pink-100">
                <h1 class="text-3xl md:text-4xl font-black text-pink-500 tracking-widest drop-shadow-sm">
                    🎀 ANFAIRY AI 🎀
                </h1>
                <p class="text-[10px] text-pink-400 font-bold uppercase tracking-[0.3em] mt-1">Smart & Aesthetic Assistant</p>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                <div class="flex flex-col items-center justify-center h-full opacity-40">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndmthZzRreXp2Z3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif" width="100" alt="cute cat">
                    <p class="mt-4 font-bold text-pink-400">Halo cantik! Mau tanya apa hari ini? ✨</p>
                </div>
            </div>

            <section class="p-4 md:p-8 bg-white/40">
                <div class="max-w-4xl mx-auto space-y-4">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <i class="fas fa-star absolute left-3 top-3 text-pink-300 text-xs"></i>
                            <select id="persona" class="w-full pl-8 p-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 outline-none text-sm font-bold text-pink-500 glass">
                                <option value="Mode Bestie">🌸 Mode Bestie (Super Friendly)</option>
                                <option value="Mode Dosen Galak">👩‍🏫 Mode Ibu Dosen (Strict)</option>
                                <option value="Pakar IT">💻 Master IT (Cool)</option>
                            </select>
                        </div>
                        <input type="file" id="fileInput" class="w-full text-xs text-pink-400 file:bg-pink-100 file:text-pink-600 file:border-0 file:rounded-full file:px-4 file:py-2 file:font-bold hover:file:bg-pink-200">
                    </div>

                    <div class="relative">
                        <textarea id="pesan" rows="2" placeholder="Tulis pesan kamu di sini... ✨" 
                            class="w-full p-5 pr-36 rounded-[30px] border-2 border-pink-100 focus:border-pink-400 outline-none shadow-inner text-pink-600 font-medium"></textarea>
                        
                        <button onclick="kirim()" id="btnKirim" 
                            class="absolute right-2 top-2 bottom-2 px-8 pink-gradient text-white font-black rounded-[25px] shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                            SEND <i class="fas fa-magic"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let chatHistory = JSON.parse(localStorage.getItem("anfairy_history")) || [];

        function updateHistoryUI() {
            const list = document.getElementById("historyList");
            list.innerHTML = chatHistory.length === 0 ? "Belum ada chat lucu... 🧸" : 
                chatHistory.map((h, i) => `
                    <div class="flex justify-between items-center p-2 bg-white/40 rounded-xl border border-pink-100 group">
                        <span class="truncate">🎀 ${h.text}</span>
                        <button onclick="deleteChat(${i})" class="hidden group-hover:block text-pink-600"><i class="fas fa-times"></i></button>
                    </div>
                `).join("");
        }

        async function kirim() {
            const msgInput = document.getElementById("pesan");
            const btn = document.getElementById("btnKirim");
            const chatBox = document.getElementById("chatBox");
            if (!msgInput.value && !document.getElementById("fileInput").files[0]) return;

            btn.disabled = true;
            btn.innerHTML = "WAIT..";

            // Simpan History
            if(msgInput.value) {
                chatHistory.unshift({ text: msgInput.value });
                localStorage.setItem("anfairy_history", JSON.stringify(chatHistory.slice(0, 8)));
                updateHistoryUI();
            }

            const formData = new FormData();
            formData.append("pesan", msgInput.value);
            formData.append("persona", document.getElementById("persona").value);
            if(document.getElementById("fileInput").files[0]) formData.append("file", document.getElementById("fileInput").files[0]);

            chatBox.innerHTML += `<div class='flex justify-end'><div class='bubble-user text-white p-4 shadow-lg text-sm'>${msgInput.value}</div></div>`;
            msgInput.value = "";

            try {
                const res = await fetch("/tanya", { method: "POST", body: formData });
                const data = await res.json();
                const id = "m" + Date.now();
                
                chatBox.innerHTML += `
                    <div class='flex justify-start items-start gap-2'>
                        <div class='bubble-ai p-4 shadow-sm text-sm text-pink-700 relative group'>
                            <b>✨ ${document.getElementById("persona").value}:</b><br><span id="${id}">${data.jawaban}</span>
                            <div class="mt-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                <button onclick="salin('${id}')" class="text-[10px] font-bold text-pink-400 bg-pink-50 px-2 py-1 rounded-lg">COPY</button>
                                <button onclick="simpan('${id}')" class="text-[10px] font-bold text-pink-400 bg-pink-50 px-2 py-1 rounded-lg">SAVE .TXT</button>
                            </div>
                        </div>
                    </div>`;
            } catch {
                chatBox.innerHTML += "<p class='text-center text-red-300'>Aduh AI-nya ngambek! 🥀</p>";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "SEND <i class='fas fa-magic'></i>";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function salin(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("Copied to your heart! 💖");
        }

        function simpan(id) {
            const blob = new Blob([document.getElementById(id).innerText], {type:"text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Anfairy-Talk.txt";
            a.click();
        }

        function deleteChat(i) {
            chatHistory.splice(i, 1);
            localStorage.setItem("anfairy_history", JSON.stringify(chatHistory));
            updateHistoryUI();
        }

        function clearHistory() {
            if(confirm("Hapus semua memori indah kita? 🥺")) {
                chatHistory = [];
                localStorage.removeItem("anfairy_history");
                updateHistoryUI();
            }
        }

        updateHistoryUI();
    </script>
</body>
</html>
