<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfairy AI 🎀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff5f7; }
        .pink-gradient { background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        /* Custom Scrollbar biar makin cantik */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ee9ca7; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans text-gray-800">

    <div class="flex flex-col md:flex-row h-screen p-3 md:p-6 gap-4">
        
        <aside class="w-full md:w-1/4 glass rounded-3xl p-5 flex flex-col shadow-lg overflow-hidden h-[250px] md:h-full">
            <h2 class="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                <i class="fas fa-history"></i> History Cantik
            </h2>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-2 pr-2 text-sm italic text-gray-500">
                Belum ada obrolan manis... 🌷
            </div>
            <button onclick="clearHistory()" class="mt-4 text-xs text-pink-400 hover:text-pink-600 transition-all">
                Hapus Semua Jejak ✨
            </button>
        </aside>

        <main class="w-full md:w-3/4 glass rounded-3xl shadow-xl flex flex-col overflow-hidden relative border-4 border-white">
            
            <header class="p-4 md:p-6 text-center border-b border-white">
                <h1 class="text-3xl md:text-4xl font-black text-pink-500 tracking-tighter flex justify-center items-center gap-2">
                    🎀 Anfairy AI 🎀
                </h1>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                <div class="flex flex-col items-center justify-center h-full text-center space-y-3 opacity-60">
                    <i class="fas fa-wand-magic-sparkles text-5xl text-pink-300"></i>
                    <p class="text-pink-400 italic">Tanya apa saja, aku siap membantu dengan gaya!</p>
                </div>
            </div>

            <section class="p-4 md:p-8 bg-white/50 border-t border-white">
                <div class="max-w-4xl mx-auto space-y-4">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-pink-400 uppercase tracking-widest ml-2">🎀 Pilih Role:</label>
                            <select id="persona" class="w-full mt-1 p-2 md:p-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 outline-none text-sm glass">
                                <option value="Mode Bestie">🌸 Mode Bestie</option>
                                <option value="Mode Dosen Galak">👩‍🏫 Mode Dosen Galak</option>
                                <option value="Pakar IT">💻 Master Coding</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-pink-400 uppercase tracking-widest ml-2">📂 Lampiran:</label>
                            <input type="file" id="fileInput" class="w-full mt-1 text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100 cursor-pointer">
                        </div>
                    </div>

                    <div class="relative flex items-center">
                        <textarea id="pesan" rows="2" placeholder="Tulis sesuatu yang cantik di sini... 🌸" 
                            class="w-full p-4 pr-32 rounded-3xl border-2 border-pink-100 focus:border-pink-400 outline-none resize-none shadow-inner text-sm md:text-base"></textarea>
                        
                        <button onclick="kirim()" id="btnKirim" 
                            class="absolute right-2 px-6 py-3 pink-gradient text-white font-bold rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-all text-sm">
                            Kirim <i class="fas fa-paper-plane ml-1"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        async function kirim() {
            const pesan = document.getElementById("pesan").value;
            const persona = document.getElementById("persona").value;
            const fileInput = document.getElementById("fileInput");
            const btn = document.getElementById("btnKirim");
            const chatBox = document.getElementById("chatBox");

            if (!pesan && !fileInput.files[0]) return;

            // Efek Loading
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i>";

            const formData = new FormData();
            formData.append("pesan", pesan);
            formData.append("persona", persona);
            if (fileInput.files[0]) formData.append("file", fileInput.files[0]);

            // Tambah Bubble Chat User ke UI
            chatBox.innerHTML += `<div class='flex justify-end animate-fade-in'><div class='bg-pink-500 text-white p-4 rounded-2xl rounded-tr-none max-w-[85%] shadow-md text-sm'>${pesan}</div></div>`;
            document.getElementById("pesan").value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/tanya", { method: "POST", body: formData });
                const data = await res.json();
                
                // Tambah Bubble AI
                chatBox.innerHTML += `<div class='flex justify-start animate-fade-in'><div class='glass p-4 rounded-2xl rounded-tl-none max-w-[85%] border-2 border-white shadow-sm text-sm'><b>${persona}:</b><br>${data.jawaban}</div></div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class='text-center text-red-400 text-xs italic'>Aduh, AI lagi pingsan... 🥀</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Kirim <i class='fas fa-paper-plane ml-1'></i>";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
